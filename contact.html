<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - The Glamour Beauty Salon</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<header class="hero">
  <h1>Book Your Appointment</h1>
  <p>Reserve your beauty session with experts</p>
</header>

<!-- NAV -->
<nav>
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="about.html">About</a>
  <a href="gallery.html">Gallery</a>
  <a href="contact.html">Contact</a>
  <a href="faq.html">FAQ</a>
  <a href="blog.html">Blog</a>
</nav>

<!-- BOOKING FORM -->
<section class="booking" id="booking">

  <h2>Book Your Appointment</h2>

  <form class="contact-form"
    action="https://formsubmit.co/theglamourbeautysalonofficial@gmail.com"
    method="POST">

    <!-- NAME -->
    <input type="text" name="Name" placeholder="Full Name" required>

    <!-- EMAIL -->
    <input type="email" name="Email" placeholder="Email Address" required>

    <!-- PHONE -->
    <input type="tel" name="Phone" placeholder="Phone Number" required>

    <!-- SERVICE -->
    <select name="Service" id="serviceSelect" required>
      <option value="">Select Service</option>
      <option>Bridal Makeup</option>
      <option>Party Makeup</option>
      <option>Hair Styling</option>
      <option>Facial</option>
      <option value="other">Other</option>
    </select>

    <!-- CUSTOM SERVICE -->
    <input type="text" id="customService" name="CustomService"
      placeholder="Enter Service"
      style="display:none; margin-top:10px;">

    <!-- DATE -->
    <label>Select Date</label>
    <input type="date" id="dateSelect" name="Date" required>

    <!-- DAY -->
    <p id="dayName"></p>

    <!-- SLOT -->
    <label>Select Time Slot</label>
    <select id="slotSelect" name="TimeSlot" required>
      <option value="">Select Date First</option>
    </select>

    <p id="slotMessage"></p>

    <!-- MESSAGE -->
    <textarea name="Message" placeholder="Special Request (Optional)"></textarea>

    <!-- FORM SETTINGS -->
    <input type="hidden" name="_subject" value="New Salon Booking">
    <input type="hidden" name="_captcha" value="false">

    <!-- ✅ IMPORTANT REDIRECT -->
    <input type="hidden" name="_next" value="https://glamour-beauty-salon-ebon.vercel.app/thanks.html">

    <button type="submit">Book Appointment</button>

  </form>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 The Glamour Beauty Salon | Karachi</p>
</footer>

<!-- SCRIPT -->
<script>
const dateSelect = document.getElementById("dateSelect");
const slotSelect = document.getElementById("slotSelect");
const dayName = document.getElementById("dayName");
const slotMessage = document.getElementById("slotMessage");
const serviceSelect = document.getElementById("serviceSelect");
const customService = document.getElementById("customService");

// schedule
const schedule = {
  Monday: ["11:00 AM", "12:00 PM", "2:00 PM", "5:00 PM"],
  Tuesday: ["11:00 AM", "1:00 PM", "3:00 PM", "6:00 PM"],
  Wednesday: ["12:00 PM", "2:00 PM", "5:00 PM"],
  Thursday: ["11:00 AM", "2:00 PM", "6:00 PM"],
  Friday: ["11:00 AM", "3:00 PM", "5:00 PM"],
  Saturday: ["12:00 PM", "2:00 PM", "6:00 PM"],
  Sunday: ["11:00 AM", "1:00 PM", "5:00 PM"]
};

// custom service
serviceSelect.addEventListener("change", () => {
  if (serviceSelect.value === "other") {
    customService.style.display = "block";
    customService.required = true;
  } else {
    customService.style.display = "none";
    customService.required = false;
  }
});

// date → slots
dateSelect.addEventListener("change", () => {
  const date = new Date(dateSelect.value);
  const day = date.toLocaleDateString("en-US", { weekday: "long" });

  dayName.innerText = "Selected Day: " + day;

  slotSelect.innerHTML = "";

  if (!schedule[day]) {
    slotSelect.innerHTML = "<option>No slots available</option>";
    return;
  }

  schedule[day].forEach(time => {
    let opt = document.createElement("option");
    opt.value = time;
    opt.textContent = time + " — Available";
    slotSelect.appendChild(opt);
  });

  slotMessage.innerText = "Choose a time slot";
});

// slot message
slotSelect.addEventListener("change", () => {
  slotMessage.innerText = "✔ Selected: " + slotSelect.value;
  slotMessage.style.color = "lightgreen";
});
</script>

</body>
</html>
